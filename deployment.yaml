apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudops-app-deployment
  labels:
    app: cloudops-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudops-web
  template:
    metadata:
      labels:
        app: cloudops-web
    spec:
      containers:
      - name: web-app-container
        image: cloudops-web-app:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: cloudops-web-service
spec:
  type: NodePort
  selector:
    app: cloudops-web
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30080